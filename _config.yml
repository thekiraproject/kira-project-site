title: The Kira Project
description: >-
  A local-first compound-AI system — one 9B model, ~50 tools, zero cloud
  inference. This site publishes what we measure.
theme: minima

# Keep the top nav clean — no page links (the home page lists the posts).
# minima builds its nav from this list; empty = just the site-title masthead.
header_pages: []

# Project Pages site served at https://thekiraproject.github.io/kira-project-site/
url: "https://thekiraproject.github.io"
baseurl: "/kira-project-site"

# Keep the raw markdown source and tickets out of the built site
exclude:
  - hn-submission-evidence.md
  - README.md
