<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <style>
    .t  { fill: #1a1a2e; }
    .mut { fill: #6b7280; }
    .pre { fill: #e07a2f; }
    .dec { fill: #3b6ff5; }
  </style>
  <rect width="860" height="400" fill="#fafaf8"/>

  <text x="40" y="44" class="t" font-size="22" font-weight="700">Where a query's model time actually goes</text>
  <text x="40" y="68" class="mut" font-size="13.5">Live system, M4 Pro, 9B model — pre-cache</text>

  <!-- legend -->
  <rect x="560" y="24" width="14" height="14" rx="3" class="pre"/>
  <text x="580" y="36" class="t" font-size="13">prefill — re-reading the prompt</text>
  <rect x="560" y="46" width="14" height="14" rx="3" class="dec"/>
  <text x="580" y="58" class="t" font-size="13">decode — actually answering</text>

  <!-- bars: scale 3.0 px/s for standard+agentic; research uses its own compressed scale -->
  <!-- STANDARD: prefill 20.0, decode 22.4  -->
  <text x="40" y="121" class="t" font-size="14.5" font-weight="600">standard</text>
  <text x="40" y="138" class="mut" font-size="12">4 model calls</text>
  <rect x="150" y="104" width="260" height="40" rx="6" class="pre"/>
  <rect x="414" y="104" width="291" height="40" rx="6" class="dec"/>
  <text x="280" y="129" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">20.0 s</text>
  <text x="559" y="129" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">22.4 s</text>
  <text x="715" y="129" class="pre" font-size="15" font-weight="800">44%</text>

  <!-- AGENTIC: prefill 13.1, decode 14.4 -->
  <text x="40" y="187" class="t" font-size="14.5" font-weight="600">agentic</text>
  <text x="40" y="204" class="mut" font-size="12">4 model calls</text>
  <rect x="150" y="170" width="170" height="40" rx="6" class="pre"/>
  <rect x="324" y="170" width="187" height="40" rx="6" class="dec"/>
  <text x="235" y="195" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">13.1 s</text>
  <text x="417" y="195" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">14.4 s</text>
  <text x="521" y="195" class="pre" font-size="15" font-weight="800">47%</text>

  <!-- RESEARCH: prefill 49.7, decode 231.5 — compressed scale 1.98px/s -->
  <text x="40" y="253" class="t" font-size="14.5" font-weight="600">research</text>
  <text x="40" y="270" class="mut" font-size="12">12 model calls</text>
  <rect x="150" y="236" width="98" height="40" rx="6" class="pre"/>
  <rect x="252" y="236" width="458" height="40" rx="6" class="dec"/>
  <text x="199" y="261" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">49.7 s</text>
  <text x="481" y="261" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">231.5 s</text>
  <text x="720" y="261" class="pre" font-size="15" font-weight="800">17%</text>

  <!-- punchline -->
  <rect x="40" y="308" width="780" height="58" rx="10" fill="#fff" stroke="#e07a2f" stroke-width="1.6"/>
  <text x="430" y="332" class="t" font-size="14.5" text-anchor="middle" font-weight="600">On the tiers users feel, nearly half of all model time was spent re-encoding</text>
  <text x="430" y="352" class="t" font-size="14.5" text-anchor="middle" font-weight="600">prompt text the model had already read — and the client reported this cost as <tspan class="pre" font-weight="800">zero</tspan>.</text>
</svg>
